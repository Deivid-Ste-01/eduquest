<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduQuest - Aprende Jugando</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <span class="logo-icon">🎓</span>
            <span class="logo-text">EduQuest</span>
        </div>
        <div class="user-stats">
            <div class="stat"><span class="stat-icon">⭐</span><span id="user-xp">0</span> XP</div>
            <div class="stat"><span class="stat-icon">🔥</span><span id="user-streak">0</span> días</div>
            <div class="stat"><span class="stat-icon">🏆</span>Nivel <span id="user-level">1</span></div>
        </div>
    </nav>

    <header class="hero">
        <div class="profile-card">
            <div class="avatar-container">
                <div class="avatar" id="user-avatar">👤</div>
                <div class="level-badge" id="level-badge">1</div>
            </div>
            <div class="profile-info">
                <h1 id="user-name">Estudiante</h1>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="xp-progress"></div>
                    <span class="progress-text" id="xp-text">0 / 100 XP</span>
                </div>
            </div>
        </div>
    </header>

    <main class="courses-container">
        <h2 class="section-title">📖 Tus Cursos</h2>
        <div class="courses-grid" id="courses-grid"></div>
        <h2 class="section-title">🎯 Logros Recientes</h2>
        <div class="achievements-grid" id="achievements-grid"></div>
    </main>

    <aside class="rewards-panel" id="rewards-panel">
        <h3>🎁 Recompensas Desbloqueadas</h3>
        <div class="rewards-list" id="rewards-list"></div>
    </aside>

    <div class="achievement-popup" id="achievement-popup">
        <div class="popup-content">
            <div class="popup-icon" id="popup-icon">🏆</div>
            <h3 id="popup-title">¡Logro Desbloqueado!</h3>
            <p id="popup-desc">Descripción del logro</p>
            <button onclick="closePopup()">¡Genial!</button>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
